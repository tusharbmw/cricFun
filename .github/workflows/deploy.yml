name: CI + Deploy to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements/local.txt
      - run: cd backend && pip install -r requirements/local.txt
      - run: |
          cd backend
          DJANGO_SETTINGS_MODULE=config.settings.test pytest apps/picks/tests.py apps/leaderboard/tests.py apps/notifications/tests.py -v

  deploy:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /home/opc/cricfun

            echo "--- Pulling latest code ---"
            git pull origin main

            echo "--- Installing Python dependencies ---"
            source venv/bin/activate
            pip install -q -r backend/requirements/base.txt

            echo "--- Building frontend ---"
            cd frontend
            npm ci --silent
            npm run build
            cd ..

            echo "--- Running migrations ---"
            DJANGO_SETTINGS_MODULE=config.settings.production \
              python backend/manage.py migrate --noinput

            echo "--- Collecting static files ---"
            DJANGO_SETTINGS_MODULE=config.settings.production \
              python backend/manage.py collectstatic --noinput

            echo "--- Fixing SELinux labels ---"
            chcon -R -t bin_t /home/opc/cricfun/venv/bin/
            chcon -R -t lib_t /home/opc/cricfun/venv/lib/
            chcon -t etc_t /home/opc/cricfun/.env
            chcon -R -t httpd_sys_content_t /home/opc/cricfun/backend/staticroot/
            chcon -R -t httpd_sys_content_t /home/opc/cricfun/frontend/dist/

            echo "--- Restarting services ---"
            # Requires passwordless sudo for systemctl restart on these services.
            # On the server run once: sudo visudo
            # Add: opc ALL=(ALL) NOPASSWD: /bin/systemctl restart cricfun, /bin/systemctl restart cricfun-celery, /bin/systemctl restart cricfun-celery-beat
            sudo systemctl restart cricfun cricfun-celery cricfun-celery-beat

            echo "--- Deploy complete ---"
            sudo systemctl status cricfun --no-pager
